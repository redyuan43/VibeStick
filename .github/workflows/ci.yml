name: CI

on:
  push:
  pull_request:

jobs:
  bridge-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile Python sources
        run: python3 -m compileall -q bridge/src tests

      - name: Run unit tests
        run: PYTHONPATH=bridge/src python3 -m unittest discover -s tests

      - name: Run firmware host tests
        run: |
          firmware/telemetry/tests/run-host-tests.sh
          firmware/sticks3/tests/run-host-tests.sh

      - name: Check shell and dashboard JavaScript
        run: |
          bash -n scripts/setup.sh scripts/doctor.sh scripts/install.sh scripts/dev.sh scripts/battery-firmware.sh scripts/battery-test.sh
          node --check bridge/src/vibe_stick/web/telemetry/telemetry.js

  telemetry-firmware:
    runs-on: ubuntu-latest
    container: espressif/idf:v5.5.1
    strategy:
      matrix:
        board: [sticks3, stickc_plus_11]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build isolated telemetry firmware
        shell: bash
        run: scripts/battery-firmware.sh build "${{ matrix.board }}"

      - name: Upload firmware image
        uses: actions/upload-artifact@v4
        with:
          name: telemetry-${{ matrix.board }}
          path: firmware/telemetry/${{ matrix.board }}/build.${{ matrix.board }}/*.bin

  vibestick-firmware:
    runs-on: ubuntu-latest
    container: espressif/idf:v5.5.1
    strategy:
      matrix:
        board: [sticks3, stickc_plus]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build VibeStick firmware
        shell: bash
        run: scripts/firmware.sh "${{ matrix.board }}" build
