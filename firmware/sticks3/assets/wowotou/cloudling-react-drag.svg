<svg id="cloudling" xmlns="http://www.w3.org/2000/svg" width="880" height="720" viewBox="-32 -24 88 72" preserveAspectRatio="xMidYMid meet">
<style><![CDATA[
.edge-rim-tight { stroke-opacity: .08; }
.edge-rim-soft { stroke-opacity: .06; }
.edge-contact { stroke-opacity: .08; }
.drag-wobble {
  transform-origin: 12px 12px;
  animation: drag-wobble var(--wobble-period, 0.9s) infinite alternate ease-in-out;
}
@keyframes drag-wobble {
  0%   { transform: rotate(calc(-1 * var(--wobble-deg, 11deg))); }
  100% { transform: rotate(var(--wobble-deg, 11deg)); }
}
.drag-breath {
  transform-origin: 12px 12px;
  animation: drag-breath var(--breath-period, 5s) infinite ease-in-out;
}
@keyframes drag-breath {
  0%, 100% { transform: scale(var(--breath-low, 0.96)); }
  50%      { transform: scale(1); }
}
@media (prefers-color-scheme: light) {
.edge-rim-tight { stroke-opacity: .15; }
.edge-rim-soft { stroke-opacity: .10; }
.edge-contact { stroke-opacity: .18; }
.cloud-drop-shadow { flood-opacity: .13; }
.food-cloud-shadow { flood-opacity: .28; flood-color: #5060FF; }
.food-cloud > path {
  stroke: #5870E8 !important;
  stroke-width: 1.2 !important;
  stroke-opacity: .9 !important;
  vector-effect: non-scaling-stroke !important;
}
}
]]></style>
    <defs>
      <linearGradient id="body-grad" x1="12" y1="2" x2="12" y2="22" gradientUnits="userSpaceOnUse">
        <stop offset="0" stop-color="#fff8e8"/>
        <stop offset="0.5" stop-color="#ffe9bd"/>
        <stop offset="1" stop-color="#e4bd84"/>
      </linearGradient>
      <linearGradient id="eye-grad" x1="12" y1="3" x2="12" y2="21" gradientUnits="userSpaceOnUse">
        <stop offset="0" stop-color="#20170F"/>
        <stop offset="0.58" stop-color="#110C08"/>
        <stop offset="1" stop-color="#050302"/>
      </linearGradient>
      <radialGradient id="hi-grad" cx="0.45" cy="0.25" r="0.55">
        <stop offset="0" stop-color="#ffffff" stop-opacity="0.9"/>
        <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
      </radialGradient>
      <filter id="drop" x="-40%" y="-40%" width="180%" height="180%">
        <feDropShadow class="cloud-drop-shadow" id="drop-shadow" dx="0" dy="0.6" stdDeviation="0.8" flood-color="#a36d36" flood-opacity="0.18"/>
      </filter>
      <filter id="edge-blur" x="-40%" y="-40%" width="180%" height="180%">
        <feGaussianBlur stdDeviation="0.16"/>
      </filter>
      <path id="cloud-shape" d="M3.25 20.45 C3.18 14.75 4.72 9.58 7.72 6.72 C8.72 5.76 9.92 5.12 11.18 4.80 C11.10 3.12 11.78 1.82 12.88 1.18 C13.78 0.66 14.88 0.78 15.42 1.20 C14.55 1.86 14.25 2.78 14.52 3.42 C14.88 4.26 15.95 4.28 16.74 3.42 C17.08 4.78 16.55 6.12 15.42 6.78 C18.45 8.05 20.75 13.05 20.75 20.45 C20.75 21.00 20.35 21.45 19.78 21.45 L4.22 21.45 C3.65 21.45 3.25 21.00 3.25 20.45 Z"/>
      <clipPath id="cloud-clip">
        <use href="#cloud-shape"/>
      </clipPath>
    </defs>

    <!-- 外层 wobble (自旋摇晃, pivot 中心) -->
    <g id="wobble-layer" class="drag-wobble">
      <!-- 内层 breath (呼吸, pivot 中心) -->
      <g id="breath-layer" class="drag-breath">
        <g id="edge-system">
          <use class="edge-contact" href="#cloud-shape" fill="none" stroke="#7d8aa7" stroke-width="1.05" stroke-linejoin="round" transform="translate(0 0.18)" filter="url(#edge-blur)"/>
          <use class="edge-rim-soft" href="#cloud-shape" fill="none" stroke="#d3a96e" stroke-width="0.90" stroke-linejoin="round" filter="url(#edge-blur)"/>
          <use class="edge-rim-tight" href="#cloud-shape" fill="none" stroke="#c49c68" stroke-width="0.42" stroke-linejoin="round"/>
        </g>
        <g filter="url(#drop)">
          <use href="#cloud-shape" fill="url(#body-grad)"/>
          <rect x="1" y="2" width="22" height="11" fill="url(#hi-grad)" clip-path="url(#cloud-clip)"/>
        </g>
        <g id="eyes-gt-lt" fill="none" stroke="url(#eye-grad)" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round">
          <path d="M 8.20 10.30 L 9.80 12.00 L 8.20 13.70"/>
          <path d="M 15.80 10.30 L 14.20 12.00 L 15.80 13.70"/>
        </g>
      </g>
    </g>

</svg>
